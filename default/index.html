<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" type="text/css" href="./styles.css" />

    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from 'https://esm.sh/react@18?dev';
      import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
      import * as zebar from 'https://esm.sh/zebar@3.0';

      const providers = zebar.createProviderGroup({
        // network: { type: 'network' },
        glazewm: { type: 'glazewm' },
        cpu: { type: 'cpu' },
        date: { type: 'date', formatting: 'EEE d MMM t' },
        battery: { type: 'battery' },
        memory: { type: 'memory' },
        // weather: { type: 'weather' },
      });


      const GlazePauseButton = ({ glazewm }) => (
        <button className="paused-button" onClick={() => glazewm.runCommand('wm-toggle-pause')}>
          PAUSED
        </button>
      );
      
      const GlazeWorkspaceName = ({ glazewm }) => (
        <span></span>
      )
      

      const GlazeBindingModes = ({ glazewm }) => (
        <>
          {glazewm.bindingModes.map((mode) => (
            <button
              key={mode.name}
              className="binding-mode"
              onClick={() => glazewm.runCommand(`wm-disable-binding-mode --name ${mode.name}`)}
            >
              {mode.displayName ?? mode.name}
            </button>
          ))}
        </>
      );

      const GlazeTilingToggle = ({ glazewm }) => {
        const icon = glazewm.tilingDirection === 'horizontal' ? 'nf-md-swap_horizontal' : 'nf-md-swap_vertical';
        return (
          <button
            className={`tiling-direction nf ${icon}`}
            onClick={() => glazewm.runCommand('toggle-tiling-direction')}
          ></button>
        );
      };

      const GlazeWorkspaces = ({ glazewm }) => (
        <div className="workspaces">
          {glazewm.currentWorkspaces.map((ws) => (
            <button
              key={ws.name}
              className={`workspace ${ws.hasFocus ? 'focused' : ''} ${ws.isDisplayed ? 'displayed' : ''}`}
              onClick={() => glazewm.runCommand(`focus --workspace ${ws.name}`)}
            >
              {ws.displayName ?? ws.name}
            </button>
          ))}
        </div>
      );
      
      const GlazeFocusContainer = ({ glazewm }) => (
        <div className="focus-container">
          {glazewm.focusedContainer.title}
        </div>
      )
    
      const NetworkStat = ({ network }) => {
        const getIcon = () => {
          const type = network.defaultInterface?.type;
          const signal = network.defaultGateway?.signalStrength;
          if (type === 'ethernet') return 'nf-md-ethernet_cable';
          if (type === 'proprietary_virtual') return 'nf-md-shield_lock_outline';
          if (type === 'wifi') {
            if (signal >= 80) return 'nf-md-wifi_strength_4';
            if (signal >= 65) return 'nf-md-wifi_strength_3';
            if (signal >= 40) return 'nf-md-wifi_strength_2';
            if (signal >= 25) return 'nf-md-wifi_strength_1';
            return 'nf-md-wifi_strength_outline';
          }
          return 'nf-md-wifi_strength_off_outline';
        };
        return (
          <div className="network">
            <i className={`nf ${getIcon()}`}></i>
            {network.defaultGateway?.ssid}
          </div>
        );
      };

      const MemoryStat = ({ memory }) => (
        <div className="memory">
          {
            //<i className="nf nf-fae-chip"></i>
          }
          <span>MEM:</span>
          {Math.round(memory.usage)}%
        </div>
      );

      const CpuStat = ({ cpu }) => (
        <div className="cpu">
          {
            // <i className="nf nf-oct-cpu"></i>
          }
          <span>CPU:</span>
          <span className={cpu.usage > 85 ? 'high-usage' : ''}>{Math.round(cpu.usage)}%</span>
        </div>
      );

      const BatteryStat = ({ battery }) => {
        const getIcon = () => {
          const charge = battery.chargePercent;
          if (charge > 90) return 'nf-fa-battery_4';
          if (charge > 70) return 'nf-fa-battery_3';
          if (charge > 40) return 'nf-fa-battery_2';
          if (charge > 20) return 'nf-fa-battery_1';
          return 'nf-fa-battery_0';
        };
        return (
          <div className="battery">
            {battery.isCharging && <i className="nf nf-md-power_plug charging-icon"></i>}
            <i className={`nf ${getIcon()}`}></i>
            {Math.round(battery.chargePercent)}%
          </div>
        );
      };

      const WeatherIcon = {
        clear_day: 'day_sunny', 
        clear_night: 'night_clear',
        cloudy_day: 'day_cloudy', 
        cloudy_night: 'night_alt_cloudy',
        light_rain_day: 'day_sprinkle',
        light_rain_night: 'night_alt_sprinkle',
        heavy_rain_day: 'day_rain',
        heavy_rain_night: 'night_alt_rain',
        snow_day: 'day_snow',
        snow_night: 'night_alt_snow',
        thunder_day: 'day_lightning',
        thunder_night: 'night_alt_lightning',
      };


      const WeatherStat = ({ weather }) => (
        <div className="weather">
          <i className={`nf nf-weather-${WeatherIcon[weather.status] || 'nf-weather-day_sunny'}`}></i>
          {Math.round(weather.celsiusTemp)}°C
        </div>
      );

      const DateStat = ({ date }) => <span className='date'>{date.formatted}</span>;

      const Divider = ({ gap = '4px' }) => <div className="divider" style={{maginLeft: gap, marginRight: gap}} />;

      function App() {
        const [output, setOutput] = useState(providers.outputMap);
        const [showSystray, setShowSystray] = useState(true);

        useEffect(() => {
          providers.onOutput(() => setOutput(providers.outputMap));
        }, []);
        
        const { glazewm, network, memory, cpu, battery, weather, systray, date } = output;

        return (
          <div className="app">
            <div className="left">
              {glazewm?.focusedContainer && <GlazeFocusContainer glazewm={glazewm} />}
            </div>

            <div className="center">
              {}
            </div>

            <div className="right">
              {glazewm?.bindingModes?.length > 0 && <GlazeBindingModes glazewm={glazewm} />}
              {glazewm?.currentWorkspaces?.length > 0 && <GlazeWorkspaces glazewm={glazewm} />}
              <Divider gap='0'/>
              {network && <NetworkStat network={network} />}
              {memory && <MemoryStat memory={memory} />}
              {cpu && <CpuStat cpu={cpu} />}
              {battery && <BatteryStat battery={battery} />}
              {weather && <WeatherStat weather={weather} />}
              <Divider />
              {date?.formatted && <DateStat date={date} />}
            </div>
          </div>
        );
      }

      createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
